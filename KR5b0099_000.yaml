front:
  text: 上清佩符文黑劵訣
  hash: sha256:cf64a23a87fb9bdf1dc39a7010250a069b809c5f9d6d481dccb1643b5d46044d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0099_HFL_000-001a, image: hfl/0192/0192-054.png}
body:
  text: 髙上玉晨命魔靈幡佩之者主制北方黑帝魔靈大王依本經按日入室誦北方曲施幡於室內安北方黃筆書黑繒上右出曲素上經黑帝招靈致真攝魔之符以白書黑木板上令廣九寸長一尺二寸安室北面修行誦經入室百日與神人共言三年室生自然緑霞之雲欲致真人天仙當書如上法著符西面精思百日真人降形仙人詣房授子神真之道右出金真玉光經白帝庚辛通靈玉符白書皂繒佩身又以庚辛之日白書黑紙上西向服之一枚三年庚辛太素玉女降見兆身通靈知西方萬里之事致西嶽仙官送自然之厨九年白帝降於寢房迎以素霞飛輪上升上清宫右出靈飛六甲經靈飛玉符元氣之精升玄羽章佩之九年得乘飛雲登修之日書右足跖心即能躡玄而飛書皂繒九寸佩之左統六甲十二神玉女十二人侍後右出九真升玄上經玉清𨚧摩亶婁于翳天沓耀遊根隱書金玄內文九天真王所受行神仙之道當以黃書黑板上置北方以滅北方大魔王官屬招致北方仙官十五年則致北極玄上玉真君授兆髙上寶書役使仙官五十人又以黃書皂紋佩身行之北方鬱單野清淨之世界則萬靈束帶魔王稽首禮迎入北嶽則致黑雲羽蓋飛行玉清宫右出玉清隱書經北帝丹靈滅魔殺鬼玉文受之於髙上三天衛以朱宫玉女六十四人一名攝殺律髙上消魔王所佩欲殺丙丁日鬼當黃書黑素上長一尺二寸廣三寸二分丙日安北方壬上丁日安癸上閉氣五息叩左齒三十六通祝曰髙上告命普攝萬靈伯吏授符稟按玉清檢督北酆束送魔名上帝所須無虧時星皇老監詔五仙部兵天一乘鉞斬滅無停萬萬伏法千千戮形殺律所攝莫不悉清畢引氣五咽止行之五日鬼魔皆束形露影受事於眼前萬凶滅迹千精自喪黃書玄繒佩身遊行天下萬妖滅凶群靈莫敢干也五年自得役使黃素玉女十二人右符出玉清隱書經上上清所佩合符圖一百五章玉文九百四十三字太玄左宫女青四極三十一卷獨立寶經明科律文云上真寶符以解兆形宿愆結過消滅風刀水火之考刀山火鄉二十四獄三塗五苦負石填河之責得佩此符超出八難凡有至學之士名參紫簡未備大經亦得單御此符以解宿根禳厄度命預期神仙别受之日聽得單盟信上金二兩紫紋四十尺以誓九天告齋如具𧵥而奉傳此盟亦可總度衆經共用以誓也餘經雖各有盟故四極總統得包於萬宗也上清佩符文黑劵訣
