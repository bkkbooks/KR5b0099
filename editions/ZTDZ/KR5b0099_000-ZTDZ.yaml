front:
  text: 上清佩符文黒劵訣
  hash: sha256:b6c8165ef23fe7c8b40809d279725abab8a413384af264114eb59fe043b77fe8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0099_SJB_000-060578b, image: sjb/06/060578b.png}
body:
  text: 髙上玉晨命魔靈旛佩之者主制北方黒帝魔靈大王依本經按日入室誦北方曲施旛於室内安北方黄筆書黒繒上右出曲素上經黒帝招靈致眞攝魔之符以白書黒木板上令廣九寸長一尺二寸安室北面修行誦經入室百日與神人共言三年室生自然緑霞之雲欲致眞人天仙當書如上法著符西面精思百日眞人降形仙人詣房授子神眞之道右出金眞玉光經白帝庚辛通靈玉符白書皂繒佩身又以庚辛之日白書黒紙上西向服之一枚三年庚辛太素玉女降見兆身通靈知西方萬里之事致西嶽仙官送自然之厨九年白帝降於寢房迎以素霞飛輪上升上清宫右出靈飛六甲經靈飛玉符元氣之精升玄羽章佩之九年得乗飛雲登修之日書右足蹠心即能躡玄而飛書皂繒九寸佩之左統六甲十二神玉女十二人侍後右出九眞升玄上經玉清𨚧摩亶婁于翳天沓耀遊根隱書金玄内文九天眞王所受行神仙之道當以黄書黒板上置北方以滅北方大魔王官屬招致北方仙官十五年則致北極玄上玉眞君授兆髙上寳書役使仙官五十人又以黄書皂紋佩身行之北方鬱單野清淨之世界則萬靈束帶魔王稽首禮迎入北岳則致黒雲羽蓋飛行玉清宫右出玉清隱書經北帝丹靈滅魔殺鬼玉文受之於髙上三天衞以朱宫玉女六十四人一名攝殺律髙上消魔王所佩欲殺丙丁日鬼當黄書黒素上長一尺二寸廣三寸二分丙日安北方壬上丁日安癸上閉氣五息叩左齒三十六通祝曰髙上告命普攝萬靈伯吏授符禀按玉清檢督北酆束送魔名上帝所須無虧時星皇老監詔五仙部兵天一乗鉞斬滅無停萬萬伏法千千戮形殺律所攝莫不悉清畢引氣五咽止行之五日鬼魔皆束形露影受事於眼前萬凶滅跡千精自喪黄書玄繒佩身遊行天下萬妖滅凶群靈莫敢干也五年自得役使黄素玉女十二人右符出玉清隱書經上上清所佩合符圖一百五章玉文九百四十三字太玄左宫女青四極三十一卷獨立寳經明科律文云上眞寳符以解兆形宿愆結過消滅風刀水火之考刀山火郷二十四獄三塗五苦負石塡河之責得佩此符超出八難凡有至學之士名參紫簡未備大經亦得單御此符以解宿根禳厄度命預期神仙别受之日聽得單盟信上金二兩紫紋四十尺以誓九天告齋如具𧵥而奉傳此盟亦可總度衆經共用以誓也餘經雖各有盟故四極總統得包於萬宗也上清佩符文黒劵訣
